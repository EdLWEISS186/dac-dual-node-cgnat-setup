name: DAC Infrastructure Intelligence Watcher

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  infrastructure-health:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run infrastructure health watcher
        working-directory: Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher
        run: |
          python infrastructure_health.py

      - name: Generate infrastructure health report
        working-directory: Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher
        run: |
          python generate_health_report.py

      - name: Generate infrastructure dashboard data
        working-directory: Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher
        run: |
          python generate_dashboard_data.py

      - name: Generate custom range reports
        working-directory: Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher
        run: |
          python generate_custom_report.py --range 7d
          python generate_custom_report.py --range 30d
          python generate_custom_report.py --range all

      - name: Commit health outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher/infrastructure_health.py
          git add Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher/generate_health_report.py
          git add Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher/generate_dashboard_data.py
          git add Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher/generate_custom_report.py
          git add Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher/README.md
          git add Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher/requirements.txt
          git add Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher/.gitignore
          git add Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher/dashboard/
          git add Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher/reports/generated/
          git add Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher/reports/generated/custom/
          git add -f Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher/data/latest.json
          git add -f Observation-for-Technical-Report/dac-infrastructure-intelligence-watcher/data/snapshots/

          if git diff --cached --quiet; then
            echo "No infrastructure health changes to commit."
          else
            git commit -m "chore: update DAC infrastructure health outputs"
            git push
          fi
