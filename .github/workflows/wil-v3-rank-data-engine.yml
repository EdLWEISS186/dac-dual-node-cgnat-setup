name: WIL v3 Legacy Rank Data Engine — Disabled

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  legacy-workflow-disabled:
    runs-on: ubuntu-latest

    steps:
      - name: Explain disabled workflow
        run: |
          echo "This legacy GitHub Actions rank engine is disabled."
          echo "WIL v3.3.0 now uses the local SQLite worker architecture."
          echo "Do not run sync_rank_data_engine.py or the legacy JSON rank generator."
          echo "Heavy state source: local SQLite with Google Drive rollover backup."
          echo "Public rank publishing will use the v3.3.0 compact snapshot architecture."
