<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAC Node Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #c8c8c8;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* OUTER CONTAINER */
    .container {
      width: 100%;
      height: 100%;
      background: #b8b8b8;
      border-radius: 24px;
      display: grid;
      grid-template-columns: 3fr 1fr;
      overflow: hidden;
    }

    /* LEFT — 2x2 GRID */
    .left {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 0;
      border-right: 3px solid #1a1a1a;
      overflow: hidden;
      min-height: 0;
    }

    /* QUADRANT */
    .quadrant {
      display: flex;
      flex-direction: column;
      padding: 14px;
      background: #b0b0b0;
      overflow: hidden;
      min-height: 0;
    }

    .quadrant:nth-child(1) { border-bottom: 3px solid #1a1a1a; border-right: 1.5px solid #1a1a1a; }
    .quadrant:nth-child(2) { border-bottom: 3px solid #1a1a1a; border-left: 1.5px solid #1a1a1a; }
    .quadrant:nth-child(3) { border-top: 0; border-right: 1.5px solid #1a1a1a; }
    .quadrant:nth-child(4) { border-top: 0; border-left: 1.5px solid #1a1a1a; }

    /* TERMINAL CARD */
    .card {
      background: #2a2a2a;
      border-radius: 16px;
      padding: 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* CONSOLE OUTPUT */
    .console {
      flex: 1;
      min-height: 0;
      background: #000;
      border-radius: 10px;
      overflow-y: auto;
      overflow-x: hidden;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 8.5px;
      padding: 8px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
    }

    .console .ansi-yellow { color: #f0c040; }
    .console .ansi-red    { color: #ff4444; }
    .console .ansi-green  { color: #00e000; }
    .console .ansi-cyan   { color: #00cccc; }
    .console .ansi-white  { color: #e0e0e0; }

    /* LABEL UNDER CONSOLE */
    .label {
      margin-top: 10px;
      background: #8fa0b4;
      padding: 8px;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
      font-size: 13px;
      color: #1a1a1a;
      letter-spacing: 0.5px;
    }

    /* RIGHT PANEL */
    .right {
      display: flex;
      flex-direction: column;
      background: #c0c0c0;
    }

    /* TOP RIGHT — NODE CONTROLS */
    .right-top {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      border-bottom: 3px solid #1a1a1a;
      gap: 10px;
    }

    /* BOTTOM RIGHT — MONITOR CONTROLS */
    .right-bottom {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      gap: 10px;
    }

    /* GEAR ROW */
    .gear-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      justify-content: center;
    }

    .gear-icon {
      font-size: 20px;
      color: #444;
    }

    /* BUTTONS */
    .btn {
      width: 100%;
      padding: 12px 0;
      border-radius: 20px;
      border: none;
      background: #8fa0b4;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 0.5px;
      color: #1a1a1a;
      transition: background 0.15s;
    }

    .btn:hover { background: #7a90a8; }
    .btn:active { background: #6a7f96; }

    /* STATUS TEXT */
    .status-text {
      font-size: 11px;
      color: #444;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-align: center;
    }

    /* PROFILE IMAGE */
    .profile-img {
      width: 110px;
      height: 110px;
      border-radius: 14px;
      object-fit: cover;
      display: block;
    }

    /* RADIO GROUP */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .radio-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 13px;
      color: #1a1a1a;
      cursor: pointer;
    }

    .radio-item input[type="radio"] {
      width: 16px;
      height: 16px;
      accent-color: #444;
      cursor: pointer;
    }

    /* FOOTER */
    .footer {
      text-align: right;
      font-weight: bold;
      font-size: 12px;
      padding: 8px 16px;
      color: #2a2a2a;
      border-top: 1px solid #aaa;
    }

    /* ZOOM BAR */
    .zoom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .panel-title {
      font-size: 9px;
      font-weight: bold;
      color: #888;
      letter-spacing: 0.5px;
    }

    .zoom-btns {
      display: flex;
      gap: 4px;
    }

    .zoom-btn {
      background: #444;
      color: #ccc;
      border: none;
      border-radius: 4px;
      width: 18px;
      height: 18px;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .zoom-btn:hover { background: #666; }
    .zoom-btn:active { background: #888; }

    /* SCROLLBAR */
    .console::-webkit-scrollbar { width: 4px; }
    .console::-webkit-scrollbar-track { background: #111; }
    .console::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="container">

    <!-- LEFT: 4 TERMINAL PANELS -->
    <div class="left">

      <!-- TOP LEFT: Windows Node -->
      <div class="quadrant">
        <div class="card">
          <div class="zoom-bar">
            <span class="panel-title">NODE</span>
            <div class="zoom-btns">
              <button class="zoom-btn" onclick="zoomPanel('winNodeBox', -1)">−</button>
              <button class="zoom-btn" onclick="zoomPanel('winNodeBox', 1)">+</button>
            </div>
          </div>
          <div class="console" id="winNodeBox"></div>
          <div class="label">WINDOWS</div>
        </div>
      </div>

      <!-- TOP RIGHT: WSL Node -->
      <div class="quadrant">
        <div class="card">
          <div class="zoom-bar">
            <span class="panel-title">NODE</span>
            <div class="zoom-btns">
              <button class="zoom-btn" onclick="zoomPanel('wslNodeBox', -1)">−</button>
              <button class="zoom-btn" onclick="zoomPanel('wslNodeBox', 1)">+</button>
            </div>
          </div>
          <div class="console" id="wslNodeBox"></div>
          <div class="label">WSL (LINUX)</div>
        </div>
      </div>

      <!-- BOTTOM LEFT: Windows Monitor -->
      <div class="quadrant">
        <div class="card">
          <div class="zoom-bar">
            <span class="panel-title">MONITOR</span>
            <div class="zoom-btns">
              <button class="zoom-btn" onclick="zoomPanel('winMonBox', -1)">−</button>
              <button class="zoom-btn" onclick="zoomPanel('winMonBox', 1)">+</button>
            </div>
          </div>
          <div class="console" id="winMonBox"></div>
          <div class="label">WINDOWS</div>
        </div>
      </div>

      <!-- BOTTOM RIGHT: WSL Monitor -->
      <div class="quadrant">
        <div class="card">
          <div class="zoom-bar">
            <span class="panel-title">MONITOR</span>
            <div class="zoom-btns">
              <button class="zoom-btn" onclick="zoomPanel('wslMonBox', -1)">−</button>
              <button class="zoom-btn" onclick="zoomPanel('wslMonBox', 1)">+</button>
            </div>
          </div>
          <div class="console" id="wslMonBox"></div>
          <div class="label">WSL (LINUX)</div>
        </div>
      </div>

    </div>

    <!-- RIGHT: CONTROLS -->
    <div class="right">

      <!-- TOP: NODE CONTROLS -->
      <div class="right-top">
        <div class="gear-row">
          <span class="gear-icon">⚙️</span>
          <button class="btn" id="btnStartNode">START / STOP</button>
        </div>
        <div class="status-text" id="nodeStatus">NODE STOPPED</div>
        <img class="profile-img" src="4.png" alt="JERUZZALEM" />
        <button class="btn" id="btnStopNode" style="background:#a08080;">STOP NODE</button>
      </div>

      <!-- BOTTOM: MONITOR CONTROLS -->
      <div class="right-bottom">
        <button class="btn" id="btnStartMonitor">START / STOP</button>

        <div class="radio-group">
          <label class="radio-item">
            <input type="radio" name="mode" value="monitor" checked />
            MONITORING
          </label>
          <label class="radio-item">
            <input type="radio" name="mode" value="log" />
            LOGGING
          </label>
        </div>

        <div class="status-text" id="monitorStatus">MONITOR STOPPED</div>
        <button class="btn" id="btnStopMonitor" style="background:#a08080;">STOP MONITOR</button>

        <div class="footer">
          Made by JERUZZALEM
          <div style="font-size: 10px; color: #000; font-weight: bold; margin-top: 2px;">v1.0.0</div>
          <img src="dac-logo.jpg" alt="DAC" style="width: 100%; margin-top: 8px; opacity: 0.85; border-radius: 6px;" />
        </div>
      </div>

    </div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
